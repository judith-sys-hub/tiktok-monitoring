<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TikTok Trending — Kärnten & Steiermark</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      font-size: 14px;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 20px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 3px solid #e63946;
    }

    header h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    header .meta {
      font-size: 12px;
      color: #a0a8c0;
      text-align: right;
      line-height: 1.6;
    }

    header .meta strong {
      color: #fff;
    }

    .badge-region {
      display: inline-block;
      background: #e63946;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 3px;
      letter-spacing: 0.5px;
      margin-right: 4px;
    }

    main {
      max-width: 1100px;
      margin: 28px auto;
      padding: 0 20px;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .toolbar h2 {
      font-size: 13px;
      color: #555;
      font-weight: 500;
    }

    .toolbar .timestamp {
      font-size: 12px;
      color: #888;
    }

    .card {
      background: #fff;
      border-radius: 8px;
      border: 1px solid #e2e6ea;
      margin-bottom: 16px;
      display: grid;
      grid-template-columns: 56px 160px 1fr;
      overflow: hidden;
      transition: box-shadow 0.15s;
    }

    .card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.09);
    }

    /* Rank */
    .rank {
      background: #1a1a2e;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -1px;
    }

    .rank.top3 {
      background: #e63946;
    }

    /* Thumbnail */
    .thumb {
      background: #0d0d0d;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      min-height: 140px;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      top: 0; left: 0;
      opacity: 0.85;
    }

    .thumb .placeholder {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0; left: 0;
      background: linear-gradient(135deg, #1a1a2e 0%, #2d2d44 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .thumb .placeholder svg {
      opacity: 0.3;
    }

    .thumb .play-btn {
      position: relative;
      z-index: 2;
      margin-bottom: 10px;
    }

    .thumb a {
      display: inline-block;
      background: rgba(230,57,70,0.9);
      color: #fff;
      text-decoration: none;
      font-size: 11px;
      font-weight: 700;
      padding: 5px 12px;
      border-radius: 4px;
      letter-spacing: 0.3px;
      position: relative;
      z-index: 2;
      margin-bottom: 8px;
    }

    .thumb a:hover {
      background: #e63946;
    }

    /* Content */
    .content {
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .content .title {
      font-size: 15px;
      font-weight: 700;
      color: #1a1a2e;
      line-height: 1.3;
    }

    .content .synopsis {
      font-size: 13px;
      color: #444;
      line-height: 1.5;
    }

    .meta-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
    }

    .meta-item {
      display: flex;
      flex-direction: column;
      min-width: 72px;
    }

    .meta-item .label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #999;
      font-weight: 600;
    }

    .meta-item .value {
      font-size: 13px;
      font-weight: 600;
      color: #1a1a2e;
      margin-top: 1px;
    }

    .hashtags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .hashtag {
      background: #f0f2f5;
      color: #1a1a2e;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 4px;
      border: 1px solid #dce0e8;
    }

    .more-notes {
      background: #fffbea;
      border: 1px solid #f0e080;
      border-radius: 5px;
      padding: 8px 10px;
      font-size: 12px;
      color: #5a4a00;
      line-height: 1.5;
    }

    .more-notes .note-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #a08000;
      margin-bottom: 4px;
    }

    .more-notes .note-text {
      font-style: italic;
    }

    .empty-note {
      color: #bbb;
      font-style: italic;
    }

    .account-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #f0f2f5;
      border: 1px solid #dce0e8;
      border-radius: 20px;
      padding: 3px 10px 3px 6px;
      font-size: 12px;
      font-weight: 600;
      color: #1a1a2e;
    }

    .account-chip .at {
      color: #e63946;
    }

    footer {
      text-align: center;
      padding: 24px;
      font-size: 11px;
      color: #aaa;
    }

    .import-btn {
      display: inline-block;
      background: #e63946;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      padding: 6px 14px;
      border-radius: 5px;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: background 0.15s;
    }

    .import-btn:hover { background: #c1121f; }

    @media print {
      body { background: #fff; }
      .card { break-inside: avoid; }
      .import-btn { display: none; }
    }
  </style>
</head>

<header>

    </div>
  </div>
  <div class="meta">
    <div><strong>Zeitraum:</strong> letzte 24 Stunden</div>
    <div><strong>Stand:</strong> <span id="stand">—</span></div>
    <div><strong>Themen:</strong> Chronik · Blaulicht · Kuriosum · Lokal</div>
  </div>
</header>

      <label class="import-btn">
        JSON laden
        <input type="file" id="jsonImport" accept=".json" style="display:none;" />
      </label>
    </div>
  </div>

  <div id="feed"></div>
</main>

<footer>
  TikTok Monitoring · Newsroom · Kärnten & Steiermark · Intern

  // -------------------------------------------------------
  // JSON-Import: data_template.json auswählen → Dashboard
  // wird automatisch neu gerendert.
  // -------------------------------------------------------
  document.getElementById('jsonImport').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const json = JSON.parse(ev.target.result);
        const videos = json.videos || json;
        if (json.meta && json.meta.stand) {
          const d = new Date(json.meta.stand);
          document.getElementById('stand').textContent = fmt(d);
          document.getElementById('ts').textContent = fmt(d);
        }
        renderFeed(videos);
      } catch(err) {
        alert('JSON konnte nicht geladen werden: ' + err.message);
      }
    };
    reader.readAsText(file);
  });

  // -------------------------------------------------------
  // Rendering
  // -------------------------------------------------------
  function renderFeed(data) {
    const feed = document.getElementById('feed');
    feed.innerHTML = '';
    data.forEach(item => {
    const isTop3 = item.rank <= 3;

    const hashtagHTML = item.hashtags.map(h =>
      `<span class="hashtag">${h}</span>`
    ).join('');

    const notesHTML = item.notes
      ? `<div class="more-notes">
           <div class="note-label">More / Notes</div>
           <div class="note-text">${item.notes}</div>
         </div>`
      : `<div class="more-notes">
           <div class="note-label">More / Notes</div>
           <div class="note-text empty-note">—</div>
         </div>`;

    feed.innerHTML += `
      <div class="card">
        <div class="rank ${isTop3 ? 'top3' : ''}">${item.rank}</div>
        <div class="thumb">
          ${item.thumbnail
            ? `<img src="${item.thumbnail}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />`
            : ''
          }
          <div class="placeholder" style="${item.thumbnail ? 'display:none' : ''}">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
          </div>
          <a href="${item.url}" target="_blank" class="play-btn">▶ Video öffnen</a>
        </div>
        <div class="content">
          <div class="title">${item.title}</div>
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">

            <span class="badge-region" style="font-size:10px;">${item.region}</span>
            <span style="font-size:11px;color:#999;">Hochgeladen: ${item.uploaded}</span>

          <div class="synopsis">${item.synopsis}</div>
          <div class="meta-grid">

            <div class="meta-item"><span class="label">Shares</span><span class="value">${item.shares}</span></div>
            <div class="meta-item"><span class="label">Kommentare</span><span class="value">${item.comments}</span></div>
          </div>
          <div class="hashtags">${hashtagHTML}</div>
          ${notesHTML}
        </div>
